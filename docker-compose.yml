version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: dte-postgres
    environment:
      POSTGRES_DB: dte
      POSTGRES_USER: dte_user
      POSTGRES_PASSWORD: dte_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dte_user -d dte"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: dte-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  localstack:
    image: localstack/localstack:latest
    container_name: dte-localstack
    environment:
      SERVICES: sqs,ssm,kms
      DEFAULT_REGION: us-east-1
      DEBUG: 0
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  postgres_data:
  minio_data:
  localstack_data:
